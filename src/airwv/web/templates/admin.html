{% extends "base.html" %}
{% block content %}
<div class="controls" style="gap:12px">
  <b>🛠️ Admin — moderation</b>
  <span id="admin-auth" class="meta"></span>
  <button id="admin-login">Enter / change token</button>
  <a href="/" class="meta">← back to dashboard</a>
</div>
<div class="controls">
  <label>Queue <select id="admin-queue">
    <option value="held">Held reports (need review)</option>
    <option value="unverified">Published (unverified)</option>
    <option value="flagged">Flagged</option>
    <option value="confirmed">Confirmed</option>
    <option value="all">All reports</option>
    <option value="feedback">Site feedback</option>
    <option value="events">Events</option>
  </select></label>
  <button id="admin-refresh">Refresh</button>
  <button id="admin-notify-test" title="Post a test message to the configured Slack/Discord webhook">Test notifications</button>
  <span id="admin-count" class="meta"></span>
</div>
<div class="card"><div id="admin-list" style="padding:12px 14px">
  <p class="meta">Enter the admin token to load the moderation queues.</p></div></div>
{% include "_modals.html" %}
{% endblock %}
{% block scripts %}
<script src="/static/admin.js"></script>
<script src="/static/reporting.js"></script>
{% endblock %}
